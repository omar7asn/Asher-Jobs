</head>
<body>

    <section> 
        <header> 
            <div class="container">
                <nav>
                    <ul>
                        <li><a href="../main-page1/index.html"><div class="logo1"></div></a></li> <!-- Displaying the logo -->
                        <li><a href="../main-page1/index.html"><h1>Asher Jobs</h1></a></li>
                        <li class="right"><div class="lang"><a href="../../main-page-login-or-sign-up AR/sign-up/signup1.html"><h6>AR</h6></a><a href="#"><h6>EN</h6></a></div></li>
                    </ul>
                </nav>
            </div>
        </header>
    </section>

    <!-- Main content with buttons -->
    <section class="main-content">
        <div class="container" style="text-align: center; padding: 100px 0;">
            <a href="../../main-page-login-or-sign-up EN/corporates-1/companies.html" class="btn">Corporates</a>

<style>
    /* signup1.html styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Global styles */
body {
    
    justify-content: center;
    min-height: 100vh;
    background: url('pexels-nappy-935949.jpg') no-repeat;
    background-size: cover;
    background-position: center;
}

.container {
    width: 80%;
    margin: auto;
    overflow: hidden;
}

/* Header styles */
header {
    background: #333;
    border: #333;
    backdrop-filter: blur(70px);
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    border-bottom: 3px solid hwb(140 4% 13%);
    display: flex;
    align-items: center;
}

header a {
    color: #fff;
    text-decoration: none;
}

header nav {
    display: flex;
    width: 100%;
}

header ul {
    list-style: none;
    display: flex;
    align-items: center;
    width: 100%;
}

header ul li {
    padding: 0 10px;
    display: flex;
    align-items: center;
}

header ul li.right {
    margin-left: auto; /* Push this li to the right */
    display: flex;
    align-items: center;
}

header ul li.right .lang {
    display: flex;
    gap: 10px; /* Add space between AR and EN links */
}
header div nav ul li {padding: 0 10px;
    display: flex; /* Ensure each li is also a flex container */
    align-items: center; /* Center items vertically */
}
.logo1 {
    background-image: url("logo1.svg");
    background-size: cover;
    width: 70px;
    height: 70px;
}

/* Button styles */
.btn {
    display: inline-block;
    background: hwb(140 4% 13%);
    color: #fff;
    padding: 10px 28px;
    text-decoration: none;
    border-radius: 5px;
    transition:background 0.3s ease;
    margin: 20px;
    font-size: 1.2em;
}

.btn:hover {
    background: #fe0101;
    color:#fff;
    border-radius: 5px;
    box-shadow: 0 0 5px  #fff,
     0 0 25px  #fff,
      0 0 50px  #fff;
}

/* Footer styles */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background-color: #333;
    color: #fff;
    text-align: center;
    padding: 10px;
}

/* Media Queries */
@media (max-width: 768px) {
    .container {
        width: 100%;
        padding: 0 20px;
    }

    header nav {
        flex-direction: column;
        align-items: flex-start;
    }

    header ul {
        flex-direction: row; /* Keep ul in row direction */
        justify-content: space-between;
        width: 100%;
    }

    header ul li {
        padding: 5px 0;
    }

    header ul li.right {
        margin-left: auto;
    }

   /* Footer styles */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(25px);
    color: #fff;
    text-align: center;
    padding: 10px;
    
}
}
</style>
</html>
