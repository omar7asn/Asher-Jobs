    <div class="wrapper">
        <form action="" id="passwordForm">
    <h2>Create a new account now</h2>
    <div class="input-box">
        <input type="text" placeholder="First Name" required pattern="[A-Za-z]+">
    </div>
    <div class="input-box">
        <input type="text" placeholder="Last Name" required pattern="[A-Za-z]+">
    </div>
    <div class="input-box">
        <input type="date" id="dob" name="dob" required>
        <i class='bx bxs-baby-carriage'></i>
    </div>
    <div class="input-box input-box3">
        <input type="email" id="email" placeholder="Email Address" required>
        <i class='bx bxs-user'></i>
    </div>
    <div class="input-box">
        <label for="password1">
            <input type="password" id="password1" placeholder="Password" required>
            <i class='bx bxs-lock-alt'></i>
        </label>
    </div>
    <div class="input-box">
        <label for="password2">
            <input type="password" id="password2" placeholder="Confirm Password" required>
            <i class='bx bxs-lock-alt'></i>
        </label>
    </div>
    <span id="error-message" class="hidden">Passwords do not match</span>
    <button type="submit" class="btn">Sign Up</button>
</form>

        <h5>by signing up you agree to terms and policy</h5>
    </div>

    <div class="wrapper2 hidden">
        <form action="" id="otpForm">
            <h2>Email Verification</h2> 
            <p>We'v+e sent a verification OTP to your email and it might take 5 minutes. Please check your inbox, junk, and spam folders, then enter the code.</p>
            <div class="input-box2">
                <input type="number" maxlength="1" />
                <input type="number" maxlength="1"/>
                <input type="number" maxlength="1"/>
                <input type="number" maxlength="1"/>

            <button type="submit" class="btn2">Verify</button>
